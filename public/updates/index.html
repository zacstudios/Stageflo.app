<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StageFlo Updates</title>
    <meta http-equiv="refresh" content="0; url=/downloads/" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        background: #f7f5ef;
        color: #1f2520;
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: 28px;
        border-radius: 16px;
        border: 1px solid rgba(31, 37, 32, 0.12);
        background: #fff;
      }

      a {
        color: #1f6a52;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to Downloads…</h1>
      <p>
        The user-facing updates page has moved to <a href="/downloads/">/downloads/</a>.
      </p>
      <p>
        Machine update manifests remain at <a href="/updates/latest.yml">/updates/latest.yml</a> and <a href="/updates/latest-mac.yml">/updates/latest-mac.yml</a>.
      </p>
    </main>
  </body>
